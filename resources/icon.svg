<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- LED glow effect -->
    <filter id="led-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bar fill gradient (subtle top-to-bottom darkening) -->
    <linearGradient id="bar-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#252525"/>
      <stop offset="100%" stop-color="#1C1C1C"/>
    </linearGradient>

    <!-- Top sheen highlight on each bar -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip to rounded-square shape -->
    <clipPath id="icon-clip">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" rx="230" fill="#111111"/>

  <!-- Subtle radial vignette for depth -->
  <radialGradient id="vignette" cx="50%" cy="40%" r="65%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#1A1A1A"/>
    <stop offset="100%" stop-color="#090909"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="230" fill="url(#vignette)"/>

  <!-- Barely-visible monitoring ring — the "clever" meta-detail -->
  <circle cx="512" cy="512" r="406" fill="none" stroke="white" stroke-width="1.5" opacity="0.04"/>

  <!-- ────────────────────────────────────────────────────────────
       SERVER BAR 1  (y = 318 – 418)
       LED: Vite purple  #646CFF
  ─────────────────────────────────────────────────────────────── -->
  <rect x="172" y="318" width="680" height="100" rx="12" fill="url(#bar-fill)" stroke="#2C2C2C" stroke-width="1.5"/>
  <!-- Top-edge sheen -->
  <rect x="173.5" y="319.5" width="677" height="52" rx="11" fill="url(#sheen)"/>

  <!-- Status LED -->
  <circle cx="232" cy="368" r="19" fill="#646CFF" filter="url(#led-glow)"/>
  <!-- LED specular highlight -->
  <ellipse cx="225" cy="360" rx="7.5" ry="5.5" fill="white" opacity="0.32"/>

  <!-- Interface placeholder lines (left info area) -->
  <rect x="274" y="355" width="84"  height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="368" width="116" height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="381" width="62"  height="6" rx="3" fill="#2C2C2C"/>

  <!-- Activity LED array (right side) -->
  <circle cx="756" cy="361" r="7" fill="#2C2C2C"/>
  <circle cx="778" cy="361" r="7" fill="#646CFF" opacity="0.55"/>
  <circle cx="800" cy="361" r="7" fill="#2C2C2C"/>
  <circle cx="822" cy="361" r="7" fill="#646CFF" opacity="0.22"/>

  <!-- Ventilation slots -->
  <rect x="756" y="376" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="384" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="392" width="72" height="3" rx="1.5" fill="#262626"/>

  <!-- ────────────────────────────────────────────────────────────
       SERVER BAR 2  (y = 462 – 562)
       LED: Node green  #22C55E
  ─────────────────────────────────────────────────────────────── -->
  <rect x="172" y="462" width="680" height="100" rx="12" fill="url(#bar-fill)" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="173.5" y="463.5" width="677" height="52" rx="11" fill="url(#sheen)"/>

  <circle cx="232" cy="512" r="19" fill="#22C55E" filter="url(#led-glow)"/>
  <ellipse cx="225" cy="504" rx="7.5" ry="5.5" fill="white" opacity="0.32"/>

  <rect x="274" y="499" width="98"  height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="512" width="68"  height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="525" width="126" height="6" rx="3" fill="#2C2C2C"/>

  <circle cx="756" cy="505" r="7" fill="#2C2C2C"/>
  <circle cx="778" cy="505" r="7" fill="#22C55E" opacity="0.55"/>
  <circle cx="800" cy="505" r="7" fill="#22C55E" opacity="0.25"/>
  <circle cx="822" cy="505" r="7" fill="#2C2C2C"/>

  <rect x="756" y="520" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="528" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="536" width="72" height="3" rx="1.5" fill="#262626"/>

  <!-- ────────────────────────────────────────────────────────────
       SERVER BAR 3  (y = 606 – 706)
       LED: Sky blue  #5BA4CF
  ─────────────────────────────────────────────────────────────── -->
  <rect x="172" y="606" width="680" height="100" rx="12" fill="url(#bar-fill)" stroke="#2C2C2C" stroke-width="1.5"/>
  <rect x="173.5" y="607.5" width="677" height="52" rx="11" fill="url(#sheen)"/>

  <circle cx="232" cy="656" r="19" fill="#5BA4CF" filter="url(#led-glow)"/>
  <ellipse cx="225" cy="648" rx="7.5" ry="5.5" fill="white" opacity="0.32"/>

  <rect x="274" y="643" width="108" height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="656" width="76"  height="6" rx="3" fill="#2C2C2C"/>
  <rect x="274" y="669" width="52"  height="6" rx="3" fill="#2C2C2C"/>

  <circle cx="756" cy="649" r="7" fill="#2C2C2C"/>
  <circle cx="778" cy="649" r="7" fill="#2C2C2C"/>
  <circle cx="800" cy="649" r="7" fill="#5BA4CF" opacity="0.55"/>
  <circle cx="822" cy="649" r="7" fill="#5BA4CF" opacity="0.22"/>

  <rect x="756" y="664" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="672" width="72" height="3" rx="1.5" fill="#262626"/>
  <rect x="756" y="680" width="72" height="3" rx="1.5" fill="#262626"/>

</svg>
